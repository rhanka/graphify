description = "Turn any folder into a graphify knowledge graph from Gemini CLI."
prompt = '''
You are the graphify custom command for Gemini CLI.

The user's raw `/graphify ...` command arguments are appended below these instructions. Parse them carefully and execute the matching graphify workflow.

Use the installed TypeScript runtime only. Do not fall back to Python.

## Command routing

- `/graphify` with no path means the current directory `.`
- `/graphify <path> [flags]` means build or update the graph for that path
- `/graphify https://github.com/<owner>/<repo> [--branch <branch>]` means clone the repo first, then run the graph flow on the local clone
- `/graphify <url1> <url2> ...` with GitHub URLs means clone each repo, build each graph, then merge them with `graphify merge-graphs`
- `/graphify summary` means return compact first-hop orientation from `.graphify/graph.json`
- `/graphify minimal-context [files...]` means return the first review call context and next graph tool route
- `/graphify review-delta [files...]` means return review-oriented impact for changed files
- `/graphify review-analysis [files...]` means return blast radius, impacted communities, bridges, test gaps, and multimodal safety
- `/graphify recommend-commits [files...]` means return advisory-only commit groups; never stage, commit, or mutate branches
- `/graphify query "<question>"` means answer from `.graphify/graph.json`
- `/graphify path "A" "B"` means show the shortest path between two nodes
- `/graphify explain "Node"` means explain one node and its neighbors
- `/graphify add <url>` means ingest the URL into `./raw` and then update the graph
- `/graphify migrate-state` means run `graphify migrate-state --dry-run` first, then ask before applying migration or git mv advice

Always prefer graphify outputs and graphify runtime commands over ad-hoc file traversal:
- If `.graphify/GRAPH_REPORT.md` exists, read it before searching raw files
- If `.graphify/wiki/index.md` exists, navigate it before reading raw files
- If the user asks about build/update/query/path/explain, stay on graphify artifacts and commands
- Before deep query/path/explain traversal, run the compact first-hop summary first

## Runtime proof

Before any build/update flow, pin the runtime:

```bash
GRAPHIFY_BIN=$(command -v graphify 2>/dev/null || true)
NODE_BIN=$(command -v node 2>/dev/null || true)

if [ -z "$GRAPHIFY_BIN" ]; then
  echo "ERROR: graphify is not installed. Run: npm install -g graphifyy"
  exit 1
fi

if [ -z "$NODE_BIN" ]; then
  echo "ERROR: node is not available in PATH."
  exit 1
fi

GRAPHIFY_CLI=$("$NODE_BIN" -e "const fs=require('fs'); console.log(fs.realpathSync(process.argv[1]));" "$GRAPHIFY_BIN")
GRAPHIFY_DIST_DIR=$("$NODE_BIN" -e "const path=require('path'); console.log(path.dirname(process.argv[1]));" "$GRAPHIFY_CLI")
GRAPHIFY_RUNTIME="$GRAPHIFY_DIST_DIR/skill-runtime.js"

mkdir -p .graphify
printf '%s' "$NODE_BIN" > .graphify/.graphify_node
printf '%s' "$GRAPHIFY_RUNTIME" > .graphify/.graphify_runtime_script
"$NODE_BIN" "$GRAPHIFY_RUNTIME" runtime-info > .graphify/.graphify_runtime.json

"$NODE_BIN" -e "
  const fs = require('fs');
  const runtime = JSON.parse(fs.readFileSync('.graphify/.graphify_runtime.json', 'utf8'));
  if (runtime.runtime !== 'typescript') {
    console.error('ERROR: expected TypeScript runtime, got', runtime.runtime);
    process.exit(1);
  }
"
```

In every subsequent shell block, use:

```bash
$(cat .graphify/.graphify_node) "$(cat .graphify/.graphify_runtime_script)" ...
```

## Build and update flow

For a build or update request:

0. If the target path is a GitHub URL, clone first:

```bash
GRAPHIFY_BRANCH_FLAG=""
if the original invocation included --branch <name>, set GRAPHIFY_BRANCH_FLAG="--branch <name>"

LOCAL_PATH=$(graphify clone "INPUT_GITHUB_URL" $GRAPHIFY_BRANCH_FLAG)
```

Use `LOCAL_PATH` as `INPUT_PATH` in the rest of the flow. If the user passed multiple GitHub URLs, clone each one, run the same build flow per local clone, then merge the resulting `.graphify/graph.json` files with `graphify merge-graphs`.

1. Detect files:

```bash
GRAPHIFY_SCOPE_FLAG="--scope auto"
if the original invocation included --all, set GRAPHIFY_SCOPE_FLAG="--all"
if the original invocation included --scope <mode>, set GRAPHIFY_SCOPE_FLAG="--scope <mode>"

$(cat .graphify/.graphify_node) "$(cat .graphify/.graphify_runtime_script)" detect "INPUT_PATH" $GRAPHIFY_SCOPE_FLAG --out .graphify/.graphify_detect.json
```

2. Summarize the corpus cleanly from the detection JSON:
- `files.code`
- `files.document`
- `files.paper`
- `files.image`
- `files.video`

Scope policy:
- default to `--scope auto` for code and review repos
- switch to `--scope tracked` when newly staged files must count
- switch to `--all` only for explicit knowledge-base style crawls
- if unsure, run `graphify scope inspect <path> --scope auto` first and explain the included/excluded counts

Always prepare the semantic detection file before semantic extraction. If there is no video/audio and no PDF requiring preparation, this simply copies the detection shape forward. It transcribes video/audio when present. For PDFs, it runs local preflight, converts text-layer PDFs locally, and keeps two OCR paths explicit: Gemini vision may interpret the original PDF or extracted image chunks during semantic extraction, while `mistral-ocr` may be used only when OCR is explicitly requested or when a configured `MISTRAL_API_KEY` is available and preflight detects a scanned/low-text PDF. In `auto` mode, if no key/provider is available, leave the source PDF in semantic inputs.

```bash
GRAPHIFY_WHISPER_FLAG=""
if the original invocation included --whisper-model <name>, set GRAPHIFY_WHISPER_FLAG="--whisper-model <name>"
GRAPHIFY_PDF_OCR_FLAG=""
if the original invocation included --pdf-ocr <mode>, set GRAPHIFY_PDF_OCR_FLAG="--pdf-ocr <mode>"

$(cat .graphify/.graphify_node) "$(cat .graphify/.graphify_runtime_script)" prepare-semantic-detect \
  $GRAPHIFY_WHISPER_FLAG \
  $GRAPHIFY_PDF_OCR_FLAG \
  --detect .graphify/.graphify_detect.json \
  --out .graphify/.graphify_detect_semantic.json \
  --transcripts-out .graphify/.graphify_transcripts.json \
  --pdf-out .graphify/.graphify_pdf_ocr.json \
  --analysis .graphify/.graphify_analysis.json
```

Use `.graphify/.graphify_detect_semantic.json` for semantic cache and semantic extraction after this step. Keep `.graphify/.graphify_detect.json` for manifest/cost/reporting.

3. Extract AST structure:

```bash
$(cat .graphify/.graphify_node) "$(cat .graphify/.graphify_runtime_script)" extract-ast \
  --detect .graphify/.graphify_detect.json \
  --out .graphify/.graphify_ast.json
```

4. Check semantic cache:

```bash
$(cat .graphify/.graphify_node) "$(cat .graphify/.graphify_runtime_script)" check-semantic-cache \
  --detect .graphify/.graphify_detect_semantic.json \
  --root . \
  --cached-out .graphify/.graphify_cached.json \
  --uncached-out .graphify/.graphify_uncached.txt
```

5. If `.graphify/.graphify_uncached.txt` is non-empty, read those docs, papers, images, generated transcripts, PDF sidecars, and relevant PDF-extracted image artifacts yourself in manageable batches and write `.graphify/.graphify_semantic_new.json` matching exactly:

```json
{"nodes":[{"id":"filestem_entityname","label":"Human Readable Name","file_type":"code|document|paper|image","source_file":"relative/path","source_location":null,"source_url":null,"captured_at":null,"author":null,"contributor":null}],"edges":[{"source":"node_id","target":"node_id","relation":"calls|implements|references|cites|conceptually_related_to|shares_data_with|semantically_similar_to|rationale_for","confidence":"EXTRACTED|INFERRED|AMBIGUOUS","confidence_score":1.0,"source_file":"relative/path","source_location":null,"weight":1.0}],"hyperedges":[{"id":"snake_case_id","label":"Human Readable Label","nodes":["node_id1","node_id2","node_id3"],"relation":"participate_in|implement|form","confidence":"EXTRACTED|INFERRED","confidence_score":0.75,"source_file":"relative/path"}],"input_tokens":0,"output_tokens":0}
```

Rules:
- `EXTRACTED`: explicit in source
- `INFERRED`: reasonable inference
- `AMBIGUOUS`: uncertain, flag it rather than omitting it
- Node IDs must stay stable across chunks and reruns. Base them on the entity label or file-relative identity only. Never append chunk counters like `_c1`, `_c2`, `_chunk3`, or similar suffixes.
- for code files, only add semantic edges AST would miss
- for image files, use vision if available; for images extracted from PDFs, decode figures, tables, diagrams, captions, and embedded text when they carry meaning, or use a delegated OCR/vision model when configured, while preserving provenance to the source PDF and sidecar
- if a file has YAML frontmatter, copy `source_url`, `captured_at`, `author`, `contributor` onto every node from that file

6. Finalize:

For a new build:

```bash
$(cat .graphify/.graphify_node) "$(cat .graphify/.graphify_runtime_script)" finalize-build \
  --detect .graphify/.graphify_detect.json \
  --ast .graphify/.graphify_ast.json \
  --cached .graphify/.graphify_cached.json \
  --semantic-new .graphify/.graphify_semantic_new.json \
  --root . \
  --graph-out .graphify/graph.json \
  --report-out .graphify/GRAPH_REPORT.md \
  --analysis-out .graphify/.graphify_analysis.json \
  --cost-out .graphify/cost.json \
  --html-out .graphify/graph.html
```

For `--update`, use `detect-incremental`, then rerun `prepare-semantic-detect --incremental` before semantic cache/extraction, and finish with `finalize-update`.

For `--cluster-only`, use:

```bash
$(cat .graphify/.graphify_node) "$(cat .graphify/.graphify_runtime_script)" cluster-only \
  --graph .graphify/graph.json \
  --root . \
  --graph-out .graphify/graph.json \
  --report-out .graphify/GRAPH_REPORT.md \
  --analysis-out .graphify/.graphify_analysis.json
```

For `--svg`, `--graphml`, `--neo4j`, `--neo4j-push`, call the matching `export-*` or `push-neo4j` runtime command after the build.

For `--mcp`, use the configured `graphify` MCP server from `.gemini/settings.json` if present, otherwise tell the user to run `graphify gemini install`.

After a successful build/update, confirm these outputs:
- `.graphify/graph.json`
- `.graphify/GRAPH_REPORT.md`
- `.graphify/graph.html`
- `.graphify/.graphify_runtime.json`

## Query, path, explain, and ingest

Before deep query/path/explain traversal, get the compact first-hop orientation:

```bash
graphify summary --graph .graphify/graph.json
graphify recommend-commits --files src/auth.ts,src/session.ts --graph .graphify/graph.json
graphify review-analysis --files src/auth.ts --graph .graphify/graph.json
graphify review-eval --cases .graphify/review-cases.json --graph .graphify/graph.json
```

Use that output to choose whether a query, node explanation, community read, or shortest path is the right next graph action.

For `query`, use the public CLI:

```bash
graphify query "<question>" --graph .graphify/graph.json
```

For `path`, use the runtime:

```bash
$(cat .graphify/.graphify_node) "$(cat .graphify/.graphify_runtime_script)" path --graph .graphify/graph.json "NODE_A" "NODE_B"
```

For `explain`, use the runtime:

```bash
$(cat .graphify/.graphify_node) "$(cat .graphify/.graphify_runtime_script)" explain --graph .graphify/graph.json "NODE_NAME"
```

For `add <url>`, ingest first, then run the update flow:

```bash
$(cat .graphify/.graphify_node) "$(cat .graphify/.graphify_runtime_script)" ingest "<url>" --target-dir ./raw
```

## Final reporting

When you finish, give the user:
- the corpus summary
- whether the run was build/update/query/path/explain/add
- the runtime proof (`typescript`)
- the key output files that were produced or reused

## Configured Project Profiles

The profile activation rule is explicit: use this branch only when `graphify.yaml`, `graphify.yml`, `.graphify/config.yaml`, or `.graphify/config.yml` exists, or the invocation includes `--config` or `--profile`. If none is active, fallback to the existing non-profile workflow.

Configured profile workflow:
1. Keep the TypeScript runtime proof in `.graphify/.graphify_runtime.json`; it must contain `"runtime": "typescript"`.
2. Run `project-config` to normalize config/profile artifacts.
3. Run the `configured-dataprep` runtime command to produce `.graphify/profile/profile-state.json`, semantic detection, and registry extraction.
4. Run the `profile-prompt` runtime command and use that prompt for assistant semantic extraction.
5. Run base extraction validation, then the `profile-validate-extraction` runtime command.
6. Merge `.graphify/profile/registry-extraction.json` with AST and semantic extraction, then finalize through the existing build/report/export runtime commands.
7. Run the `profile-report` runtime command to write `.graphify/profile/profile-report.md`.
8. If `dataprep.image_analysis.enabled` is true, use `image-calibration-samples` and `image-calibration-replay` for calibration. The assistant may propose labels or rule changes, but TypeScript replay owns acceptance.
9. For batch image analysis, use `image-batch-export` and `image-batch-import`. A deep-pass export is allowed only when project-owned routing rules declare `decision: accept_matrix`; do not make production route decisions in the assistant.
10. If the profile declares `outputs.ontology.enabled: true`, run `ontology-output` to compile `.graphify/ontology/` after validated extraction exists.

Do not add MCP, embeddings, databases, direct provider SDKs, a resident LLM backend, or a forked OCR/PDF pipeline for this branch.

## Lifecycle State

- Runtime state lives under `.graphify/`; do not create legacy visible state directories.
- If `.graphify/graph.json` is missing but legacy `graphify-out/graph.json` exists, run `graphify migrate-state --dry-run` first. If it reports tracked legacy artifacts, ask before using the recommended `git mv -f graphify-out .graphify` and commit message; do not auto-stage or auto-commit.
- Use `.graphify/wiki/index.md` first when present, then `.graphify/GRAPH_REPORT.md`, before searching raw files.
- If `.graphify/needs_update` exists or `.graphify/branch.json` has `"stale": true`, tell the user the graph is stale and run the platform graphify command with `--update` before relying on semantic results.
- Before proposing or committing `.graphify` artifacts, run `graphify portable-check .graphify`; commit-safe graph artifacts must use repo-relative paths, and never commit .graphify/branch.json, never commit .graphify/worktree.json, or `.graphify/needs_update`.
- Git hooks may mark stale state after branch switches, merges, and rewrites. Never delete `.graphify/` automatically; use `graphify state prune` only as a non-destructive cleanup preview.

The user's raw `/graphify ...` arguments are appended below this prompt.
'''

# Commit recommendation workflow
# `graphify recommend-commits` is advisory-only. The user remains the actor; do not auto-stage, auto-commit, or mutate branches.

# Review analysis workflow
# `graphify review-analysis` adds blast radius, bridge nodes, test-gap hints, impacted communities, and multimodal/doc safety. `graphify review-eval` measures token savings, impacted-file recall, review summary precision, and multimodal regression safety.

# CRG review workflow
# `graphify minimal-context` is the first review call. Keep graph review context within `<=5 graph tool calls` and `<=800` graph-context tokens. If `.graphify/needs_update` exists or `.graphify/branch.json` has `stale=true`, warn and update before trusting semantic review output. Then follow only the compact route: `graphify detect-changes` for risk, `graphify affected-flows` for flow impact, and `graphify review-context` for snippets or radius detail. If `.graphify/flows.json` is missing and flows are needed, run `graphify flows build` first. Explicit `--files`, `--base`, `--head`, or `--staged` inputs override unrelated dirty worktree noise; mention dirty worktrees as a warning and never mutate git state.
